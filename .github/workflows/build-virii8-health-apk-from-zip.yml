name: Build Virii8 Companion APK From ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-debug-apk:
    name: Build Virii8 Companion debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Android source ZIP
        id: source
        run: |
          set -e

          echo "Repository files:"
          ls -lah

          if [ -f "virii8-health-companion-android-v0.1.1-responsive-help-source.zip" ]; then
            SOURCE_ZIP="virii8-health-companion-android-v0.1.1-responsive-help-source.zip"
          else
            SOURCE_ZIP="$(find . -maxdepth 1 -type f \( -name 'virii8-companion-android-v*.zip' -o -name 'virii8-health-companion-android-v*.zip' \) | sort -V | tail -n 1 | sed 's#^\./##')"
          fi

          if [ -z "$SOURCE_ZIP" ]; then
            echo "No Virii8 Companion Android source ZIP found in repo root." >&2
            exit 1
          fi

          echo "Selected source ZIP: $SOURCE_ZIP"
          echo "zip=$SOURCE_ZIP" >> "$GITHUB_OUTPUT"
          ls -lh "$SOURCE_ZIP"

      - name: Extract Android project
        run: |
          rm -rf build-src
          mkdir -p build-src
          unzip -q "${{ steps.source.outputs.zip }}" -d build-src
          find build-src -maxdepth 3 -type f | sort | sed -n '1,160p'

      - name: Locate project root
        id: project
        run: |
          PROJECT_DIR="$(find build-src -maxdepth 3 -name settings.gradle -printf '%h\n' | head -n 1)"

          if [ -z "$PROJECT_DIR" ]; then
            echo "settings.gradle not found after extraction" >&2
            exit 1
          fi

          echo "Project directory: $PROJECT_DIR"
          echo "dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform/build tools
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Make Gradle wrapper executable
        working-directory: ${{ steps.project.outputs.dir }}
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: ${{ steps.project.outputs.dir }}
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: virii8-companion-debug-apk
          path: ${{ steps.project.outputs.dir }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
