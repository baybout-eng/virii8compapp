name: Build Virii8 Companion Android v1.0.5 Phase 4 Release Execution Gate Source

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'virii8-companion-android-v1.0.5-phase4-release-execution-gate-source.zip'
      - '.github/workflows/build-virii8-companion-android-v1.0.5-phase4-release-execution-gate-source.yml'

jobs:
  build-virii8-companion-android-v105:
    name: Build Virii8 Companion Android v1.0.5 APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      SOURCE_ZIP: virii8-companion-android-v1.0.5-phase4-release-execution-gate-source.zip
      V8_RELEASE_KEYSTORE_BASE64: ${{ secrets.V8_RELEASE_KEYSTORE_BASE64 }}
      V8_RELEASE_STORE_PASSWORD: ${{ secrets.V8_RELEASE_STORE_PASSWORD }}
      V8_RELEASE_KEY_ALIAS: ${{ secrets.V8_RELEASE_KEY_ALIAS }}
      V8_RELEASE_KEY_PASSWORD: ${{ secrets.V8_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm Virii8 Companion Android v1.0.5 source ZIP exists
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "$SOURCE_ZIP" ]; then
            echo "Missing source ZIP: $SOURCE_ZIP" >&2
            echo "Expected repo-root file:" >&2
            echo "$SOURCE_ZIP" >&2
            exit 1
          fi

          echo "Found source ZIP:"
          ls -lh "$SOURCE_ZIP"

      - name: Extract Virii8 Companion Android source ZIP
        shell: bash
        run: |
          set -euo pipefail

          rm -rf build-src
          mkdir -p build-src

          unzip -q "$SOURCE_ZIP" -d build-src

          echo "Extracted source preview:"
          find build-src -maxdepth 4 -type f | sort | sed -n '1,200p'

      - name: Locate Android project root
        id: project
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="$(find build-src -maxdepth 4 -name settings.gradle -exec dirname {} \; | head -n 1)"

          if [ -z "$PROJECT_DIR" ]; then
            echo "Could not find settings.gradle after extracting $SOURCE_ZIP" >&2
            find build-src -maxdepth 4 -type f | sort >&2
            exit 1
          fi

          echo "Project directory: $PROJECT_DIR"
          echo "dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true

      - name: Install Android SDK platform and build tools
        shell: bash
        run: |
          sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Make Gradle wrapper and Virii8 scripts executable
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail

          chmod +x ./gradlew

          if [ -d scripts ]; then
            find scripts -type f -name "*.sh" -exec chmod +x {} \;
          fi

      - name: Verify Virii8 Android build environment
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -f scripts/verify-build-environment.sh ]; then
            ./scripts/verify-build-environment.sh
          else
            echo "scripts/verify-build-environment.sh not found; skipping."
          fi

      - name: Verify Virii8 Android source package markers
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -f scripts/verify-source-package.sh ]; then
            ./scripts/verify-source-package.sh
          else
            echo "scripts/verify-source-package.sh not found; skipping."
          fi

      - name: Build debug APK
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail

          ./gradlew --no-daemon clean :app:assembleDebug

      - name: Upload Virii8 Companion Android v1.0.5 debug APK
        uses: actions/upload-artifact@v4
        with:
          name: virii8-companion-android-v1.0.5-debug-apk
          path: ${{ steps.project.outputs.dir }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Configure release signing from GitHub secrets
        id: signing
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${V8_RELEASE_KEYSTORE_BASE64:-}" ] && \
             [ -n "${V8_RELEASE_STORE_PASSWORD:-}" ] && \
             [ -n "${V8_RELEASE_KEY_ALIAS:-}" ] && \
             [ -n "${V8_RELEASE_KEY_PASSWORD:-}" ]; then

            mkdir -p release

            echo "$V8_RELEASE_KEYSTORE_BASE64" | base64 --decode > release/virii8-companion-release.keystore

            {
              echo "storeFile=release/virii8-companion-release.keystore"
              echo "storePassword=${V8_RELEASE_STORE_PASSWORD}"
              echo "keyAlias=${V8_RELEASE_KEY_ALIAS}"
              echo "keyPassword=${V8_RELEASE_KEY_PASSWORD}"
            } > keystore.properties

            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Release signing configured."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Release signing secrets are missing."
            echo "Debug APK was built. Signed release APK/AAB will be skipped."
          fi

      - name: Build signed release APK and AAB
        if: steps.signing.outputs.configured == 'true'
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail

          ./gradlew --no-daemon :app:assembleRelease :app:bundleRelease

      - name: Verify release artifacts
        if: steps.signing.outputs.configured == 'true'
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -f scripts/verify-release-artifacts.sh ]; then
            ./scripts/verify-release-artifacts.sh
          else
            echo "scripts/verify-release-artifacts.sh not found; skipping."
          fi

      - name: Collect release evidence package
        if: steps.signing.outputs.configured == 'true'
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -f scripts/collect-release-evidence-package.sh ]; then
            ./scripts/collect-release-evidence-package.sh
          else
            echo "scripts/collect-release-evidence-package.sh not found; skipping."
          fi

      - name: Assert release evidence gate
        if: steps.signing.outputs.configured == 'true'
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -f scripts/assert-release-evidence-complete.sh ]; then
            ./scripts/assert-release-evidence-complete.sh
          else
            echo "scripts/assert-release-evidence-complete.sh not found." >&2
            echo "Signed release was built, but the Phase 4 evidence gate could not be asserted." >&2
            exit 1
          fi

      - name: Upload Virii8 Companion Android v1.0.5 signed release APK
        if: steps.signing.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: virii8-companion-android-v1.0.5-release-apk
          path: ${{ steps.project.outputs.dir }}/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload Virii8 Companion Android v1.0.5 signed release AAB
        if: steps.signing.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: virii8-companion-android-v1.0.5-release-aab
          path: ${{ steps.project.outputs.dir }}/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload Virii8 Companion Android v1.0.5 release evidence
        if: steps.signing.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: virii8-companion-android-v1.0.5-release-evidence
          path: ${{ steps.project.outputs.dir }}/release/evidence-v1.0.5/**
          if-no-files-found: error
