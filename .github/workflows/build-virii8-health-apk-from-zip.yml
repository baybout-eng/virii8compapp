name: Build Virii8 Companion v1.0.0 From ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'virii8-companion-android-v1.0.0-production-release-candidate-source.zip'
      - '.github/workflows/build-virii8-health-apk-from-zip.yml'

jobs:
  build-from-zip:
    name: Build debug and optional signed release from ZIP
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      SOURCE_ZIP: virii8-companion-android-v1.0.0-production-release-candidate-source.zip
      V8_RELEASE_KEYSTORE_BASE64: ${{ secrets.V8_RELEASE_KEYSTORE_BASE64 }}
      V8_RELEASE_STORE_PASSWORD: ${{ secrets.V8_RELEASE_STORE_PASSWORD }}
      V8_RELEASE_KEY_ALIAS: ${{ secrets.V8_RELEASE_KEY_ALIAS }}
      V8_RELEASE_KEY_PASSWORD: ${{ secrets.V8_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm source ZIP exists
        run: |
          test -f "$SOURCE_ZIP"
          ls -lh "$SOURCE_ZIP"

      - name: Extract Android project
        run: |
          rm -rf build-src
          mkdir -p build-src
          unzip -q "$SOURCE_ZIP" -d build-src
          find build-src -maxdepth 3 -type f | sort | sed -n '1,160p'

      - name: Locate project root
        id: project
        run: |
          PROJECT_DIR="$(find build-src -maxdepth 3 -name settings.gradle -printf '%h\n' | head -n 1)"

          if [ -z "$PROJECT_DIR" ]; then
            echo "settings.gradle not found after extraction" >&2
            exit 1
          fi

          echo "Project directory: $PROJECT_DIR"
          echo "dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform/build tools
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Make Gradle wrapper executable
        working-directory: ${{ steps.project.outputs.dir }}
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: ${{ steps.project.outputs.dir }}
        run: ./gradlew --no-daemon clean printSigningStatus assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: virii8-companion-v1.0.0-debug-apk
          path: ${{ steps.project.outputs.dir }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Configure release signing from secrets
        id: signing
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${V8_RELEASE_KEYSTORE_BASE64:-}" ] && [ -n "${V8_RELEASE_STORE_PASSWORD:-}" ] && [ -n "${V8_RELEASE_KEY_ALIAS:-}" ] && [ -n "${V8_RELEASE_KEY_PASSWORD:-}" ]; then
            mkdir -p release

            echo "$V8_RELEASE_KEYSTORE_BASE64" | base64 --decode > release/virii8-companion-release.keystore

            {
              echo "storeFile=release/virii8-companion-release.keystore"
              echo "storePassword=${V8_RELEASE_STORE_PASSWORD}"
              echo "keyAlias=${V8_RELEASE_KEY_ALIAS}"
              echo "keyPassword=${V8_RELEASE_KEY_PASSWORD}"
            } > keystore.properties

            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Release signing secrets missing. Debug APK was built. Signed release APK/AAB skipped."
          fi

      - name: Build signed release APK and AAB
        if: steps.signing.outputs.configured == 'true'
        working-directory: ${{ steps.project.outputs.dir }}
        run: ./gradlew --no-daemon printSigningStatus assembleRelease bundleRelease

      - name: Upload signed release APK artifact
        if: steps.signing.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: virii8-companion-v1.0.0-release-apk
          path: ${{ steps.project.outputs.dir }}/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload signed release AAB artifact
        if: steps.signing.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: virii8-companion-v1.0.0-release-aab
          path: ${{ steps.project.outputs.dir }}/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
