name: Build Virii8 Companion APK From ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'virii8-companion-android-v0.9.0-private-testing-candidate-source.zip'
      - '.github/workflows/build-virii8-health-apk-from-zip.yml'

jobs:
  build-debug-apk:
    name: Build Virii8 Companion debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm source ZIP exists
        run: |
          test -f virii8-companion-android-v0.9.0-private-testing-candidate-source.zip
          ls -lh virii8-companion-android-v0.9.0-private-testing-candidate-source.zip

      - name: Extract Android project
        run: |
          rm -rf build-src
          mkdir -p build-src
          unzip -q virii8-companion-android-v0.9.0-private-testing-candidate-source.zip -d build-src
          find build-src -maxdepth 3 -type f | sort | sed -n '1,160p'

      - name: Locate project root
        id: project
        run: |
          PROJECT_DIR="$(find build-src -maxdepth 3 -name settings.gradle -printf '%h\n' | head -n 1)"

          if [ -z "$PROJECT_DIR" ]; then
            echo "settings.gradle not found after extraction" >&2
            exit 1
          fi

          echo "Project directory: $PROJECT_DIR"
          echo "dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform/build tools
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Make Gradle wrapper executable
        working-directory: ${{ steps.project.outputs.dir }}
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: ${{ steps.project.outputs.dir }}
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: virii8-companion-v0.9.0-debug-apk
          path: ${{ steps.project.outputs.dir }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
